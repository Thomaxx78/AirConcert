<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AirConcert</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1a1a25; --border: #2a2a3a;
  --text: #e8e6f0; --dim: #7a7890;
  --red: #ff3d5a; --green: #00e5a0; --blue: #5b5bff; --yellow: #ffb800;
  --glow-red: rgba(255,61,90,.3); --glow-green: rgba(0,229,160,.3);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow: hidden; }

/* ── SCREENS ── */
.screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; }
.screen.active { display: flex; }

/* ── HOME ── */
#homeScreen {
  align-items: center; justify-content: center; gap: 36px;
  background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(255,61,90,.08) 0%, transparent 100%), var(--bg);
}
.home-title {
  font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 900; letter-spacing: -3px; text-align: center;
  background: linear-gradient(135deg, var(--text) 0%, var(--red) 50%, var(--blue) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.2); } }
.home-sub { font-family: 'Space Mono', monospace; font-size: .8rem; color: var(--dim); letter-spacing: 4px; text-transform: uppercase; text-align: center; }
.home-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }

/* ── BUTTONS ── */
.btn {
  font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 1rem;
  padding: 14px 32px; border: none; border-radius: 12px; cursor: pointer;
  transition: all .2s cubic-bezier(.4,0,.2,1);
}
.btn-primary { background: var(--red); color: #fff; box-shadow: 0 4px 20px var(--glow-red); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--glow-red); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--red); }
.btn-sm { padding: 9px 18px; font-size: .85rem; border-radius: 8px; }
.btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }

/* ── LOBBY ── */
#lobbyScreen { padding: 24px; gap: 20px; overflow-y: auto; background: var(--bg); }
.lobby-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.lobby-header h2 { font-weight: 800; font-size: 1.6rem; letter-spacing: -1px; }
.code-badge {
  font-family: 'Space Mono', monospace; font-size: 1.3rem; color: var(--red);
  background: var(--surface); padding: 6px 18px; border-radius: 8px; border: 1px solid var(--border); letter-spacing: 4px;
}
.section-label { font-weight: 700; font-size: 1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.section-label .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

/* Songs */
.song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.song-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: all .18s; }
.song-card:hover { border-color: var(--blue); }
.song-card.selected { border-color: var(--red); background: rgba(255,61,90,.07); box-shadow: 0 0 18px var(--glow-red); }
.song-card .sname { font-weight: 700; font-size: .95rem; }
.song-card .sinfo { font-size: .75rem; color: var(--dim); margin-top: 3px; }
.song-card .stems { margin-top: 8px; display: flex; gap: 5px; flex-wrap: wrap; }
.stem-tag { font-family: 'Space Mono', monospace; font-size: .6rem; padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--dim); text-transform: uppercase; }

/* Players */
.players-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.player-chip {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 16px; min-width: 140px; flex: 1; max-width: 220px;
}
.player-chip .pname { font-weight: 700; font-size: .9rem; }
.player-chip .prole { font-size: .7rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.player-chip select {
  background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  padding: 7px 10px; border-radius: 6px; font-family: 'Outfit', sans-serif; font-size: .82rem; width: 100%; cursor: pointer;
}
.player-chip.me { border-color: var(--green); }

.lobby-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: auto; padding-top: 10px; }

/* Connection status */
.ws-status { display: flex; align-items: center; gap: 6px; font-family: 'Space Mono', monospace; font-size: .7rem; color: var(--dim); }
.ws-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
.ws-dot.ok { background: var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.3; } }

/* ── CONCERT ── */
#concertScreen { background: var(--bg); }

.concert-header {
  padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); background: rgba(10,10,15,.9); backdrop-filter: blur(10px);
  flex-shrink: 0; z-index: 2;
}
.concert-song { font-weight: 800; font-size: 1rem; }
.concert-meta { font-size: .7rem; color: var(--dim); }
.concert-right { display: flex; align-items: center; gap: 16px; }
.concert-timer { font-family: 'Space Mono', monospace; font-size: 1.1rem; color: var(--red); }

.progress-wrap { height: 3px; background: var(--surface2); flex-shrink: 0; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--red), var(--blue)); width: 0%; transition: width .3s; }

/* Concert stage: my cam top + band bottom */
.concert-stage { flex: 1; display: flex; flex-direction: column; padding: 14px; gap: 12px; overflow: hidden; }

/* My camera section */
.my-section { display: flex; gap: 14px; flex-shrink: 0; }

.my-cam-wrap {
  position: relative; border-radius: 12px; overflow: hidden;
  background: var(--surface2); border: 2px solid var(--border);
  width: 220px; min-width: 160px; aspect-ratio: 4/3; flex-shrink: 0;
}
.my-cam-wrap video { width: 100%; height: 100%; object-fit: cover; display: none; }
.my-cam-wrap canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.cam-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; color: var(--dim); font-size: .75rem; text-align: center; padding: 12px; }

.motion-bar-wrap { margin-top: 6px; height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; }
.motion-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--green), var(--yellow)); border-radius: 3px; transition: width .08s; }

.my-info { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 10px; min-width: 0; }
.my-instrument-icon { font-size: 2.8rem; line-height: 1; }
.my-instrument-name { font-weight: 800; font-size: 1.3rem; letter-spacing: -0.5px; }
.my-instrument-hint { font-family: 'Space Mono', monospace; font-size: .7rem; color: var(--dim); line-height: 1.5; }
.my-status { display: inline-flex; align-items: center; gap: 7px; padding: 5px 12px; border-radius: 20px; font-weight: 600; font-size: .8rem; transition: all .25s; }
.my-status.playing { background: rgba(0,229,160,.15); color: var(--green); }
.my-status.muted { background: rgba(255,61,90,.1); color: var(--red); }
.countdown-overlay {
  position: absolute; inset: 0; background: rgba(10,10,15,.85);
  display: flex; align-items: center; justify-content: center;
  font-size: 4rem; font-weight: 900; color: var(--red);
  transition: opacity .5s; z-index: 10;
}
.countdown-overlay.hidden { opacity: 0; pointer-events: none; }

/* Band section */
.band-section { flex: 1; overflow-y: auto; min-height: 0; }
.band-label { font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
.band-row { display: flex; gap: 8px; flex-wrap: wrap; }

.band-card {
  background: var(--surface); border: 2px solid var(--border); border-radius: 10px;
  padding: 10px 14px; display: flex; flex-direction: column; align-items: center; gap: 5px;
  flex: 1; min-width: 80px; max-width: 130px;
  transition: all .3s cubic-bezier(.4,0,.2,1);
}
.band-card.playing { border-color: var(--green); box-shadow: 0 0 16px var(--glow-green); }
.band-card.offline { opacity: .4; }
.band-card .bc-icon { font-size: 1.5rem; }
.band-card .bc-name { font-size: .75rem; font-weight: 700; text-align: center; }
.band-card .bc-instr { font-family: 'Space Mono', monospace; font-size: .6rem; color: var(--dim); text-transform: uppercase; }
.vol-bars { display: flex; gap: 2px; align-items: flex-end; height: 18px; }
.vol-bar { width: 3px; background: var(--green); border-radius: 1px; transition: height .1s; }
.band-card:not(.playing) .vol-bar { background: var(--dim); height: 2px !important; }

.concert-footer {
  padding: 8px 20px; display: flex; justify-content: center; gap: 10px;
  border-top: 1px solid var(--border); background: rgba(10,10,15,.9); backdrop-filter: blur(10px);
  flex-shrink: 0;
}

/* Join modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.72); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 14px; }
.modal h3 { font-weight: 800; font-size: 1.2rem; }
.modal input {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 11px 14px; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: .95rem; width: 100%;
}
.modal input:focus { outline: none; border-color: var(--red); }
.modal-code { font-family: 'Space Mono', monospace; letter-spacing: 5px; text-align: center; text-transform: uppercase; }
.modal-row { display: flex; gap: 10px; }

.toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); padding: 10px 22px; border-radius: 10px; font-size: .82rem; color: var(--dim); z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; text-align: center; white-space: nowrap; }
.toast.show { opacity: 1; }

@media (max-width: 480px) {
  .my-section { flex-direction: column; }
  .my-cam-wrap { width: 100%; aspect-ratio: 4/3; }
  .home-title { font-size: 2.8rem; }
}
</style>
</head>
<body>

<!-- ── HOME ── -->
<div id="homeScreen" class="screen active">
  <div class="home-title">AirConcert</div>
  <div class="home-sub">Jouez ensemble. Sans instruments.</div>
  <div class="home-btns">
    <button class="btn btn-primary" onclick="showCreateModal()">Créer une session</button>
    <button class="btn btn-secondary" onclick="showJoinModal()">Rejoindre</button>
  </div>
  <div class="ws-status">
    <span class="ws-dot" id="wsDot"></span>
    <span id="wsLabel">Connexion…</span>
  </div>
</div>

<!-- ── LOBBY ── -->
<div id="lobbyScreen" class="screen">
  <div class="lobby-header">
    <h2>Lobby</h2>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="ws-status"><span class="ws-dot ok" id="wsDotLobby"></span><span id="wsLabelLobby">connecté</span></div>
      <div class="code-badge" id="lobbyCode">----</div>
    </div>
  </div>

  <div id="songSection">
    <div class="section-label"><span class="dot"></span> Morceau</div>
    <div class="song-grid" id="songGrid"></div>
  </div>

  <div>
    <div class="section-label"><span class="dot"></span> Joueurs</div>
    <div class="players-grid" id="playersList"></div>
  </div>

  <div class="lobby-footer">
    <button class="btn btn-secondary btn-sm" onclick="goHome()">Quitter</button>
    <button class="btn btn-primary" id="startBtn" onclick="requestStartConcert()" disabled>Lancer le concert</button>
  </div>
</div>

<!-- ── CONCERT ── -->
<div id="concertScreen" class="screen">
  <div class="concert-header">
    <div>
      <div class="concert-song" id="cSongName">—</div>
      <div class="concert-meta" id="cSongMeta">—</div>
    </div>
    <div class="concert-right">
      <div class="concert-timer" id="cTimer">0:00</div>
    </div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="concert-stage">
    <!-- My section -->
    <div class="my-section">
      <div class="my-cam-wrap" id="myCamWrap">
        <video id="myCamVideo" autoplay playsinline muted></video>
        <canvas id="myCamCanvas"></canvas>
        <div class="countdown-overlay hidden" id="countdownOverlay">3</div>
      </div>
      <div class="my-info">
        <div class="my-instrument-icon" id="myIcon">🎵</div>
        <div class="my-instrument-name" id="myInstrName">—</div>
        <div class="my-instrument-hint" id="myHint">Bougez pour jouer !</div>
        <div class="motion-bar-wrap"><div class="motion-bar" id="motionBar"></div></div>
        <div class="my-status muted" id="myStatusBadge">🔇 En pause</div>
      </div>
    </div>

    <!-- Band -->
    <div class="band-section">
      <div class="band-label">Le groupe</div>
      <div class="band-row" id="bandRow"></div>
    </div>
  </div>

  <div class="concert-footer">
    <button class="btn btn-secondary btn-sm" onclick="stopConcert()">Quitter le concert</button>
  </div>
</div>

<!-- Create modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>Créer une session</h3>
    <input type="text" id="createName" placeholder="Ton prénom" maxlength="20">
    <div class="modal-row">
      <button class="btn btn-secondary" style="flex:1" onclick="hideModal('createModal')">Annuler</button>
      <button class="btn btn-primary" style="flex:1" onclick="createSession()">Créer</button>
    </div>
  </div>
</div>

<!-- Join modal -->
<div class="modal-overlay" id="joinModal">
  <div class="modal">
    <h3>Rejoindre</h3>
    <input type="text" id="joinCode" placeholder="Code (ex: AB3K)" maxlength="4" class="modal-code">
    <input type="text" id="joinName" placeholder="Ton prénom" maxlength="20">
    <div class="modal-row">
      <button class="btn btn-secondary" style="flex:1" onclick="hideModal('joinModal')">Annuler</button>
      <button class="btn btn-primary" style="flex:1" onclick="joinSession()">Rejoindre</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  SONGS
// ============================================================
const SONGS = [
  { id: 'rock1',    name: 'Rock Anthem',   artist: 'AirConcert', bpm: 120, duration: 120, stems: ['guitare','basse','batterie','voix'] },
  { id: 'jazz1',    name: 'Jazz Café',     artist: 'AirConcert', bpm: 95,  duration: 120, stems: ['piano','basse','batterie','saxophone'] },
  { id: 'pop1',     name: 'Pop Summer',    artist: 'AirConcert', bpm: 110, duration: 120, stems: ['piano','guitare','batterie','voix'] },
  { id: 'electro1', name: 'Electro Pulse', artist: 'AirConcert', bpm: 128, duration: 120, stems: ['synthé','basse','batterie','pad'] },
];
const ICONS = { guitare:'🎸', basse:'🎸', batterie:'🥁', voix:'🎤', piano:'🎹', saxophone:'🎷', synthé:'🎛️', pad:'🎚️' };

// ============================================================
//  STATE
// ============================================================
let ws = null;
let myId = sessionStorage.getItem('airconcert_id') || Math.random().toString(36).slice(2, 10);
sessionStorage.setItem('airconcert_id', myId);

let myName = '';
let session = { code: null, players: [], songId: null }; // local mirror
let isHost = false;
let concertTimerInterval = null;
let concertAudioStart = null; // absolute Date.now() when audio should start
let audioCtx = null;
let instrumentNodes = {}; // { playerId: nodes }
let peerVolumes = {}; // { playerId: 0-1 } from websocket
let camDetectionActive = false;
let lastSentVolume = -1;
let lastSentTime = 0;

// ============================================================
//  WEBSOCKET
// ============================================================
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    setWsDot(true);
  };

  ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    handleMsg(msg);
  };

  ws.onclose = () => {
    setWsDot(false);
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => {};
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function setWsDot(ok) {
  ['wsDot','wsDotLobby'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'ws-dot' + (ok ? ' ok' : '');
  });
  const lbl = document.getElementById('wsLabel');
  if (lbl) lbl.textContent = ok ? 'connecté' : 'reconnexion…';
}

function handleMsg(msg) {
  switch (msg.type) {
    case 'session':       onSession(msg); break;
    case 'player_joined': onPlayerJoined(msg); break;
    case 'player_left':   onPlayerLeft(msg); break;
    case 'song_selected': onSongSelected(msg); break;
    case 'instrument_assigned': onInstrumentAssigned(msg); break;
    case 'concert_start': onConcertStart(msg); break;
    case 'play_state':    onPlayState(msg); break;
    case 'error':         showToast(msg.msg || 'Erreur'); break;
  }
}

// ── Handlers ──────────────────────────────────────────────
function onSession(msg) {
  session.code = msg.code;
  session.songId = msg.songId;
  session.players = msg.players;
  showScreen('lobbyScreen');
  document.getElementById('lobbyCode').textContent = msg.code;
  renderSongs();
  renderPlayers();
  updateStartBtn();
}

function onPlayerJoined(msg) {
  if (!session.players.find(p => p.id === msg.player.id))
    session.players.push(msg.player);
  renderPlayers();
  updateStartBtn();
  showToast(`${msg.player.name} a rejoint !`);
}

function onPlayerLeft(msg) {
  session.players = session.players.filter(p => p.id !== msg.playerId);
  renderPlayers();
  updateStartBtn();
  // Remove from band row if in concert
  const card = document.querySelector(`[data-band-id="${msg.playerId}"]`);
  if (card) card.classList.add('offline');
}

function onSongSelected(msg) {
  session.songId = msg.songId;
  // Reset instruments
  session.players.forEach(p => p.instrument = null);
  renderSongs();
  renderPlayers();
  updateStartBtn();
}

function onInstrumentAssigned(msg) {
  const p = session.players.find(x => x.id === msg.playerId);
  if (p) p.instrument = msg.instrument;
  renderPlayers();
  updateStartBtn();
  // update band card if in concert
  const card = document.querySelector(`[data-band-id="${msg.playerId}"]`);
  if (card) {
    const ic = card.querySelector('.bc-icon');
    const instr = card.querySelector('.bc-instr');
    if (ic) ic.textContent = ICONS[msg.instrument] || '🎵';
    if (instr) instr.textContent = msg.instrument || '';
  }
}

function onConcertStart(msg) {
  concertAudioStart = msg.startAt;
  session.songId = msg.songId;
  startConcertUI(msg.startAt);
}

function onPlayState(msg) {
  peerVolumes[msg.playerId] = msg.volume;
  // Update audio
  setPlayerVolume(msg.playerId, msg.volume);
  // Update band card
  const card = document.querySelector(`[data-band-id="${msg.playerId}"]`);
  if (card) {
    const playing = msg.volume > 0.05;
    card.classList.toggle('playing', playing);
    card.querySelectorAll('.vol-bar').forEach(b => {
      b.style.height = playing ? (Math.random() * 14 + 3) + 'px' : '2px';
    });
  }
}

// ============================================================
//  NAV
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg, dur = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), dur);
}

function showCreateModal() { document.getElementById('createModal').classList.add('active'); document.getElementById('createName').focus(); }
function showJoinModal()   { document.getElementById('joinModal').classList.add('active');   document.getElementById('joinCode').focus(); }
function hideModal(id)     { document.getElementById(id).classList.remove('active'); }

function goHome() {
  stopConcert();
  session = { code: null, players: [], songId: null };
  showScreen('homeScreen');
}

// ============================================================
//  SESSION ACTIONS
// ============================================================
function createSession() {
  myName = document.getElementById('createName').value.trim() || 'Hôte';
  isHost = true;
  hideModal('createModal');
  send({ type: 'create', id: myId, name: myName });
}

function joinSession() {
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  myName = document.getElementById('joinName').value.trim() || 'Joueur';
  if (!code) { showToast('Entre un code de session'); return; }
  isHost = false;
  hideModal('joinModal');
  send({ type: 'join', code, id: myId, name: myName });
}

// ============================================================
//  SONG / INSTRUMENT
// ============================================================
function renderSongs() {
  const grid = document.getElementById('songGrid');
  grid.innerHTML = '';
  const hostMode = isHost || session.players.find(p => p.id === myId)?.isHost;

  SONGS.forEach(song => {
    const card = document.createElement('div');
    card.className = 'song-card' + (session.songId === song.id ? ' selected' : '');
    card.innerHTML = `<div class="sname">${song.name}</div><div class="sinfo">${song.artist} — ${song.bpm} BPM</div><div class="stems">${song.stems.map(s => `<span class="stem-tag">${s}</span>`).join('')}</div>`;
    if (hostMode) card.onclick = () => { send({ type: 'select_song', songId: song.id }); };
    else card.style.cursor = 'default';
    grid.appendChild(card);
  });
}

function renderPlayers() {
  const list = document.getElementById('playersList');
  list.innerHTML = '';
  const song = SONGS.find(s => s.id === session.songId);
  const taken = session.players.map(p => p.instrument).filter(Boolean);

  session.players.forEach(p => {
    const chip = document.createElement('div');
    chip.className = 'player-chip' + (p.id === myId ? ' me' : '');
    const isMe = p.id === myId;

    let instrHTML = '';
    if (song && isMe) {
      const opts = song.stems.map(stem => {
        const isTaken = taken.includes(stem) && p.instrument !== stem;
        return `<option value="${stem}" ${p.instrument === stem ? 'selected':''} ${isTaken ? 'disabled':''}>${ICONS[stem]||'🎵'} ${stem}${isTaken ? ' ✗':''}</option>`;
      }).join('');
      instrHTML = `<select onchange="chooseInstrument(this.value)"><option value="">— Choisir —</option>${opts}</select>`;
    } else if (p.instrument) {
      instrHTML = `<div style="font-size:.85rem;color:var(--yellow);font-family:'Space Mono',monospace;">${ICONS[p.instrument]||'🎵'} ${p.instrument}</div>`;
    } else {
      instrHTML = `<div style="font-size:.75rem;color:var(--dim);font-style:italic">pas d'instrument</div>`;
    }

    chip.innerHTML = `<div class="pname">${p.name} ${p.isHost ? '👑' : ''} ${p.id === myId ? '(toi)' : ''}</div><div class="prole">${p.isHost ? 'Chef' : 'Musicien'}</div>${instrHTML}`;
    list.appendChild(chip);
  });
}

function chooseInstrument(instr) {
  send({ type: 'select_instrument', instrument: instr || null });
}

function updateStartBtn() {
  const me = session.players.find(p => p.id === myId);
  const isHostPlayer = me?.isHost;
  const btn = document.getElementById('startBtn');
  btn.style.display = isHostPlayer ? '' : 'none';
  if (!isHostPlayer) return;
  const ready = session.songId && session.players.length > 0 && session.players.every(p => p.instrument);
  btn.disabled = !ready;
}

function requestStartConcert() {
  send({ type: 'start_concert' });
}

// ============================================================
//  CONCERT UI
// ============================================================
async function startConcertUI(startAt) {
  const song = SONGS.find(s => s.id === session.songId);
  if (!song) return;
  const me = session.players.find(p => p.id === myId);
  if (!me) return;

  showScreen('concertScreen');
  document.getElementById('cSongName').textContent = song.name;
  document.getElementById('cSongMeta').textContent = `${song.artist} — ${song.bpm} BPM`;

  // My instrument info
  document.getElementById('myIcon').textContent = ICONS[me.instrument] || '🎵';
  document.getElementById('myInstrName').textContent = me.instrument || '';
  document.getElementById('myHint').textContent = 'Bougez devant votre caméra pour jouer !';

  // Band row
  const row = document.getElementById('bandRow');
  row.innerHTML = '';
  session.players.forEach(p => {
    const card = document.createElement('div');
    card.className = 'band-card';
    card.setAttribute('data-band-id', p.id);
    card.innerHTML = `
      <div class="bc-icon">${ICONS[p.instrument] || '🎵'}</div>
      <div class="bc-name">${p.name}${p.id === myId ? ' ★' : ''}</div>
      <div class="bc-instr">${p.instrument || ''}</div>
      <div class="vol-bars">${Array(5).fill('<div class="vol-bar" style="height:2px"></div>').join('')}</div>`;
    row.appendChild(card);
  });

  // Init audio BEFORE countdown
  initAudio(song);
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  // Countdown
  const overlay = document.getElementById('countdownOverlay');
  const delay = startAt - Date.now();
  if (delay > 0) {
    overlay.classList.remove('hidden');
    let count = Math.ceil(delay / 1000);
    overlay.textContent = count;
    const iv = setInterval(() => {
      count--;
      if (count <= 0) { clearInterval(iv); overlay.classList.add('hidden'); }
      else overlay.textContent = count;
    }, 1000);
    setTimeout(() => {
      overlay.classList.add('hidden');
      startAudioAndDetection(song);
    }, Math.max(0, delay));
  } else {
    overlay.classList.add('hidden');
    startAudioAndDetection(song);
  }
}

async function startAudioAndDetection(song) {
  // Start all instrument loops
  Object.values(instrumentNodes).forEach(nodes => { if (nodes.play) nodes.play(); });

  // Timer
  const concertStart = Date.now();
  concertTimerInterval = setInterval(() => {
    const elapsed = (Date.now() - concertStart) / 1000;
    const m = Math.floor(elapsed / 60), s = Math.floor(elapsed % 60);
    document.getElementById('cTimer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    document.getElementById('progressBar').style.width = Math.min((elapsed / song.duration) * 100, 100) + '%';
    if (elapsed >= song.duration) {
      // Loop: restart from beginning conceptually (instruments keep looping)
    }
  }, 250);

  // Camera
  await startCamera();
}

// ============================================================
//  AUDIO ENGINE
// ============================================================
function initAudio(song) {
  if (audioCtx) { try { audioCtx.close(); } catch(e) {} }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  instrumentNodes = {};

  session.players.forEach(player => {
    const nodes = buildInstrument(player.instrument, song.bpm);
    instrumentNodes[player.id] = nodes;
  });
}

function buildInstrument(instr, bpm) {
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);
  const beat = 60 / bpm;
  const nodes = { masterGain, intervals: [] };

  switch (instr) {
    case 'batterie': {
      nodes.play = () => {
        const iv = setInterval(() => {
          // Kick
          const o = audioCtx.createOscillator(), g = audioCtx.createGain();
          o.type = 'sine';
          o.frequency.setValueAtTime(150, audioCtx.currentTime);
          o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + .12);
          g.gain.setValueAtTime(.9, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .15);
          o.connect(g).connect(masterGain); o.start(); o.stop(audioCtx.currentTime + .16);
          // Hihat
          setTimeout(() => {
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * .05, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*.3;
            const bs = audioCtx.createBufferSource(), hg = audioCtx.createGain();
            bs.buffer = buf;
            hg.gain.setValueAtTime(.35, audioCtx.currentTime);
            hg.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .05);
            bs.connect(hg).connect(masterGain); bs.start();
          }, beat * 500);
        }, beat * 1000);
        nodes.intervals.push(iv);
      };
      break;
    }
    case 'basse': {
      const ns = [55, 65.41, 73.42, 82.41]; let ni = 0;
      nodes.play = () => {
        const iv = setInterval(() => {
          const o = audioCtx.createOscillator(), f = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
          o.type = 'sawtooth'; o.frequency.value = ns[ni++ % ns.length];
          f.type = 'lowpass'; f.frequency.value = 280;
          g.gain.setValueAtTime(.55, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + beat*.85);
          o.connect(f).connect(g).connect(masterGain); o.start(); o.stop(audioCtx.currentTime + beat*.85);
        }, beat * 1000);
        nodes.intervals.push(iv);
      };
      break;
    }
    case 'guitare': {
      const chords = [[329.63,392,493.88],[261.63,329.63,392],[293.66,369.99,440],[246.94,311.13,369.99]]; let ci = 0;
      nodes.play = () => {
        const iv = setInterval(() => {
          const ch = chords[ci++ % chords.length];
          ch.forEach((freq, i) => setTimeout(() => {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'triangle'; o.frequency.value = freq;
            g.gain.setValueAtTime(.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + beat*1.5);
            o.connect(g).connect(masterGain); o.start(); o.stop(audioCtx.currentTime + beat*1.5);
          }, i * 30));
        }, beat * 2000);
        nodes.intervals.push(iv);
      };
      break;
    }
    case 'piano': {
      const mel = [523.25,587.33,659.25,698.46,783.99,698.46,659.25,587.33]; let mi = 0;
      nodes.play = () => {
        const iv = setInterval(() => {
          const o = audioCtx.createOscillator(), g = audioCtx.createGain();
          o.type = 'sine'; o.frequency.value = mel[mi++ % mel.length];
          g.gain.setValueAtTime(.38, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + beat*.9);
          o.connect(g).connect(masterGain); o.start(); o.stop(audioCtx.currentTime + beat);
        }, beat * 500);
        nodes.intervals.push(iv);
      };
      break;
    }
    case 'voix': {
      const vf = [440,466.16,493.88,523.25,554.37,523.25,493.88,466.16]; let vi = 0;
      nodes.play = () => {
        const iv = setInterval(() => {
          const o = audioCtx.createOscillator(), g = audioCtx.createGain();
          const vib = audioCtx.createOscillator(), vg = audioCtx.createGain();
          o.type = 'sine'; o.frequency.value = vf[vi++ % vf.length];
          vib.frequency.value = 5; vg.gain.value = 7;
          vib.connect(vg).connect(o.frequency); vib.start();
          g.gain.setValueAtTime(.28, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + beat*1.8);
          o.connect(g).connect(masterGain); o.start(); o.stop(audioCtx.currentTime + beat*2);
          vib.stop(audioCtx.currentTime + beat*2);
        }, beat * 2000);
        nodes.intervals.push(iv);
      };
      break;
    }
    case 'saxophone': {
      const sf = [349.23,392,440,523.25,440,392,349.23,329.63]; let si = 0;
      nodes.play = () => {
        const iv = setInterval(() => {
          const o = audioCtx.createOscillator(), f = audioCtx.createBiquadFilter(), g = audioCtx.createGain();
          o.type = 'sawtooth'; o.frequency.value = sf[si++ % sf.length];
          f.type = 'lowpass'; f.frequency.value = 1100;
          g.gain.setValueAtTime(.22, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + beat*1.4);
          o.connect(f).connect(g).connect(masterGain); o.start(); o.stop(audioCtx.currentTime + beat*1.4);
        }, beat * 1000);
        nodes.intervals.push(iv);
      };
      break;
    }
    case 'synthé': {
      nodes.play = () => {
        const o = audioCtx.createOscillator(), f = audioCtx.createBiquadFilter();
        const lfo = audioCtx.createOscillator(), lg = audioCtx.createGain(), g = audioCtx.createGain();
        o.type = 'sawtooth'; o.frequency.value = 220;
        f.type = 'lowpass'; f.frequency.value = 800;
        lfo.frequency.value = .5; lg.gain.value = 380;
        lfo.connect(lg).connect(f.frequency); lfo.start();
        g.gain.value = .16;
        o.connect(f).connect(g).connect(masterGain); o.start();
        nodes._so = o; nodes._sl = lfo;
      };
      nodes.stop = () => { try { nodes._so?.stop(); nodes._sl?.stop(); } catch(e) {} };
      break;
    }
    case 'pad': {
      nodes.play = () => {
        nodes._po = [220, 277.18, 329.63].map(freq => {
          const o = audioCtx.createOscillator(), g = audioCtx.createGain();
          o.type = 'sine'; o.frequency.value = freq; g.gain.value = .1;
          o.connect(g).connect(masterGain); o.start(); return o;
        });
      };
      nodes.stop = () => nodes._po?.forEach(o => { try { o.stop(); } catch(e) {} });
      break;
    }
  }
  return nodes;
}

function setPlayerVolume(pid, vol) {
  const n = instrumentNodes[pid];
  if (!n || !audioCtx) return;
  const now = audioCtx.currentTime;
  n.masterGain.gain.cancelScheduledValues(now);
  n.masterGain.gain.setValueAtTime(n.masterGain.gain.value, now);
  n.masterGain.gain.linearRampToValueAtTime(Math.max(0, Math.min(vol, 1)), now + .08);
}

// ============================================================
//  CAMERA + MOTION DETECTION
// ============================================================
async function startCamera() {
  camDetectionActive = true;
  const video = document.getElementById('myCamVideo');
  const canvas = document.getElementById('myCamCanvas');
  const wrap = document.getElementById('myCamWrap');

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240, facingMode: 'user' }, audio: false });
    video.srcObject = stream;
    await video.play();
    wrap.querySelector('.cam-placeholder')?.remove();
  } catch(e) {
    wrap.innerHTML += '<div class="cam-placeholder">📷 Caméra non disponible<br><small>Votre instrument jouera automatiquement</small></div>';
    // Simulate playing at constant volume
    setPlayerVolume(myId, .8);
    send({ type: 'play_state', volume: .8 });
    return;
  }

  // Draw mirrored + detect motion
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const W = 320, H = 240;
  canvas.width = W; canvas.height = H;

  let prevFrame = null;
  let motionLevel = 0;
  let isPlaying = false;

  const ON_THRESH  = 0.045; // start playing
  const OFF_THRESH = 0.016; // stop playing
  const ANIM_BARS_INTERVAL = 150; // ms for animating own band card bars

  let lastBandAnim = 0;

  const loop = () => {
    if (!camDetectionActive) return;
    if (video.readyState < 2) { requestAnimationFrame(loop); return; }

    // Draw mirrored video
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, -W, 0, W, H);
    ctx.restore();

    const frame = ctx.getImageData(0, 0, W, H);

    if (prevFrame) {
      let moved = 0, total = 0;
      for (let i = 0; i < frame.data.length; i += 16) {
        const diff = Math.abs(frame.data[i]   - prevFrame.data[i])
                   + Math.abs(frame.data[i+1] - prevFrame.data[i+1])
                   + Math.abs(frame.data[i+2] - prevFrame.data[i+2]);
        total++;
        if (diff > 28) moved++;
      }
      const raw = total > 0 ? moved / total : 0;
      motionLevel = motionLevel * .76 + raw * .24;

      // Hysteresis
      if (!isPlaying && motionLevel > ON_THRESH)  isPlaying = true;
      if (isPlaying  && motionLevel < OFF_THRESH) isPlaying = false;

      const vol = isPlaying ? Math.min(motionLevel * 14, 1.0) : 0;

      // Update own audio
      setPlayerVolume(myId, vol);

      // Update motion bar UI
      document.getElementById('motionBar').style.width = Math.min(motionLevel * 500, 100) + '%';

      // Update status badge
      const badge = document.getElementById('myStatusBadge');
      badge.textContent = isPlaying ? '🎵 En train de jouer' : '🔇 En pause';
      badge.className = 'my-status ' + (isPlaying ? 'playing' : 'muted');

      // Animate my own band card
      const now = Date.now();
      if (now - lastBandAnim > ANIM_BARS_INTERVAL) {
        lastBandAnim = now;
        const myCard = document.querySelector(`[data-band-id="${myId}"]`);
        if (myCard) {
          myCard.classList.toggle('playing', isPlaying);
          myCard.querySelectorAll('.vol-bar').forEach(b => {
            b.style.height = isPlaying ? (Math.random() * 14 + 3) + 'px' : '2px';
          });
        }
      }

      // Send to server (throttled)
      if (now - lastSentTime > 80 && Math.abs(vol - lastSentVolume) > 0.04) {
        lastSentVolume = vol;
        lastSentTime = now;
        send({ type: 'play_state', volume: vol });
      }
    }

    prevFrame = frame;
    requestAnimationFrame(loop);
  };

  loop();
}

// ============================================================
//  STOP CONCERT
// ============================================================
function stopConcert() {
  camDetectionActive = false;

  if (concertTimerInterval) { clearInterval(concertTimerInterval); concertTimerInterval = null; }

  // Stop audio
  Object.values(instrumentNodes).forEach(n => {
    n.intervals?.forEach(clearInterval);
    n.stop?.();
    try { n.masterGain?.disconnect(); } catch(e) {}
  });
  instrumentNodes = {};

  // Stop camera
  const video = document.getElementById('myCamVideo');
  if (video?.srcObject) video.srcObject.getTracks().forEach(t => t.stop());

  if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; }

  showScreen('lobbyScreen');
}

//  INIT
// ============================================================
connectWS();
